<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSE案例演示（EventSource 单流版）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .chat-container { display: flex; flex-direction: column; height: 600px; }
    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }
    .message { margin-bottom: 16px; display: flex; align-items: flex-start; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .message.user .message-content {
      background: #007aff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .message-content {
      background: #fff;
      color: #333;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .status-indicator {
      padding: 8px 16px;
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      margin: 8px 20px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
    }
    .status-indicator.active { display: block; }

    .typing-indicator {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e0e0e0;
    }
    .typing-dots { display: flex; margin-left: 8px; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #999; margin: 0 2px;
      animation: typing 1.4s infinite both;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .input-area {
      padding: 20px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
    }
    .input-container { display: flex; gap: 12px; }
    #messageInput {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 16px;
      outline: none;
    }
    #messageInput:focus { border-color: #007aff; }
    #sendButton {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    #sendButton:hover:not(:disabled) { transform: translateY(-1px); opacity: 0.95; }
    #sendButton:disabled { opacity: 0.5; cursor: not-allowed; }

    .tool-call {
      background: #e8f4fd;
      border-left: 3px solid #2196f3;
      padding: 8px 12px;
      margin: 8px 0;
      border-radius: 4px;
      font-size: 14px;
    }
    .error-message {
      background: #fde8e8;
      border-left: 3px solid #f44336;
      padding: 8px 12px;
      margin: 8px 0;
      border-radius: 4px;
      font-size: 14px;
      color: #c53030;
    }
    .conversation-id {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }

    @media (max-width: 640px) {
      .container { border-radius: 0; }
      .chat-container { height: 500px; }
      .message-content { max-width: 85%; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🤖 SSE案例演示</h1>
      <p>FastAPI /Agent/ SSE</p>
    </div>

    <div class="chat-container">
      <div class="chat-history" id="chatHistory">
        <div class="message assistant">
          <div class="message-content">您好！我已就绪。你可以问“武汉天气怎么样？”试试。</div>
        </div>
      </div>

      <div class="status-indicator" id="statusIndicator">
        <span id="statusText">正在思考中...</span>
      </div>

      <div class="input-area">
        <div class="input-container">
          <input type="text" id="messageInput" placeholder="请输入您的问题..." autocomplete="off" />
          <button id="sendButton" onclick="window.sendMessage()">发送</button>
        </div>
        <div class="conversation-id" id="conversationId">
          对话ID: <span id="conversationIdValue">未建立</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    /*
      这个前端页面的核心目标是：

      1. 用户输入问题
      2. 前端调用后端 SSE 接口
      3. 后端持续推送：
         - tool_started
         - tool_completed
         - text_delta
         - run_completed
         - error
      4. 前端一边接收，一边实时更新聊天界面

      也就是说，这个页面不是一次性 fetch 完整结果，
      而是通过 EventSource 建立一条“持续接收事件”的连接。
    */

    class ChatClient {
      constructor() {
        // 后端地址。
        // 这里写死为本地地址，便于演示。
        this.baseUrl = "http://localhost:8200";

        // 可选的会话 ID。
        // 当前页面预留了这个字段，但后端示例里并没有真正持久化会话。
        this.conversationId = null;

        // 当前 EventSource 连接对象。
        this.eventSource = null;

        // 当前是否处于流式输出中。
        this.isStreaming = false;

        // 指向“当前正在输出中的 assistant 消息 DOM 节点”。
        this.currentAssistantMsgEl = null;

        // 指向“正在输出...”提示节点。
        this.typingEl = null;

        this.bindUI();
        this.updateStatus("已就绪（等待发送）", false);
      }

      bindUI() {
        // 绑定回车发送。
        const input = document.getElementById("messageInput");
        input.addEventListener("keypress", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            this.sendMessage();
          }
        });
      }

      // ===== UI helpers =====
      addUserMessage(text) {
        // 在聊天区追加一条“用户消息”。
        const chatHistory = document.getElementById("chatHistory");

        const wrap = document.createElement("div");
        wrap.className = "message user";

        const content = document.createElement("div");
        content.className = "message-content";
        content.textContent = text;

        wrap.appendChild(content);
        chatHistory.appendChild(wrap);
        this.scrollToBottom();
      }

      startAssistantMessage() {
        // 开始创建一条新的“助手消息”。
        // 因为后续文本是流式 delta 追加进来的，
        // 所以需要先准备一个空容器。
        const chatHistory = document.getElementById("chatHistory");

        const wrap = document.createElement("div");
        wrap.className = "message assistant";

        const content = document.createElement("div");
        content.className = "message-content";
        content.textContent = "";

        wrap.appendChild(content);
        chatHistory.appendChild(wrap);
        this.currentAssistantMsgEl = content;

        // 同时加一个“正在输出...”的打字机提示。
        const typingWrap = document.createElement("div");
        typingWrap.className = "message assistant";
        typingWrap.innerHTML = `
          <div class="typing-indicator">
            正在输出...
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
          </div>
        `;
        chatHistory.appendChild(typingWrap);
        this.typingEl = typingWrap;

        this.scrollToBottom();
      }

      appendAssistantDelta(delta) {
        /*
          把后端发来的文本增量追加到当前助手消息里。

          这就是“打字机效果”的核心：
          后端每推送一小段文字，前端就把这一小段拼接到当前消息中。
        */
        if (!this.currentAssistantMsgEl) this.startAssistantMessage();

        // 当消息刚开始时，去掉开头的多余换行，
        // 避免部分模型一上来输出多个换行导致界面空一大片。
        if (this.currentAssistantMsgEl.textContent.length === 0) {
          delta = (delta || "").replace(/^\n+/, "");
        }

        this.currentAssistantMsgEl.textContent += delta;
        this.scrollToBottom();
      }

      finishAssistantMessage() {
        // 一条完整消息输出结束后，去掉 typing 指示器。
        if (this.typingEl) {
          this.typingEl.remove();
          this.typingEl = null;
        }
        this.currentAssistantMsgEl = null;
        this.scrollToBottom();
      }

      showToolLine(text, ok = true) {
        // 在聊天区插入一条“工具调用状态提示”。
        const chatHistory = document.getElementById("chatHistory");
        const div = document.createElement("div");
        div.className = "tool-call";
        div.textContent = ok ? text : `❌ ${text}`;
        chatHistory.appendChild(div);
        this.scrollToBottom();
      }

      showError(text) {
        // 在聊天区插入错误提示。
        const chatHistory = document.getElementById("chatHistory");
        const div = document.createElement("div");
        div.className = "error-message";
        div.textContent = `❌ 错误: ${text}`;
        chatHistory.appendChild(div);
        this.scrollToBottom();
      }

      updateStatus(text, show) {
        // 更新顶部状态提示条。
        const box = document.getElementById("statusIndicator");
        const t = document.getElementById("statusText");
        t.textContent = text || "";
        if (show && text) box.classList.add("active");
        else box.classList.remove("active");
      }

      setConversationId(id) {
        // 更新页面上的会话 ID 文本。
        this.conversationId = id;
        document.getElementById("conversationIdValue").textContent = id || "未建立";
      }

      setSendingDisabled(disabled) {
        // 流式过程中通常应禁止重复发送，避免并发冲突。
        document.getElementById("sendButton").disabled = !!disabled;
        document.getElementById("messageInput").disabled = !!disabled;
      }

      scrollToBottom() {
        const chatHistory = document.getElementById("chatHistory");
        chatHistory.scrollTop = chatHistory.scrollHeight;
      }

      // ===== SSE connection =====
      closeStream() {
        /*
          关闭当前 EventSource 连接，并恢复 UI。

          这个方法在以下场景会被调用：
          - 新请求开始前，先关闭旧连接
          - 流式输出正常结束
          - 发生错误
        */
        if (this.eventSource) {
          this.eventSource.close();
          this.eventSource = null;
        }
        this.isStreaming = false;
        this.setSendingDisabled(false);
        this.updateStatus("", false);
      }

      openStream(queryText) {
        /*
          与后端建立 SSE 长连接。

          这一步会：
          1. 拼接查询参数
          2. 创建 EventSource
          3. 分别监听后端定义的各类事件名
          4. 根据不同事件更新页面
        */

        // 防止并发：若上一次连接还没关，先关掉。
        this.closeStream();

        const params = new URLSearchParams();
        params.set("query", queryText);
        if (this.conversationId) params.set("conversation_id", this.conversationId);

        const sseUrl = `${this.baseUrl}/api/chat/sse?${params.toString()}`;

        this.eventSource = new EventSource(sseUrl);
        this.isStreaming = true;

        this.setSendingDisabled(true);
        this.updateStatus("正在处理...", true);

        // 后端如果发送 conversation_started，就可以在这里接收。
        this.eventSource.addEventListener("conversation_started", (e) => {
          try {
            const data = JSON.parse(e.data);
            this.setConversationId(data.conversation_id);
          } catch (err) {
            this.showError("conversation_started 解析失败");
          }
        });

        // 工具开始执行。
        this.eventSource.addEventListener("tool_started", (e) => {
          try {
            const data = JSON.parse(e.data);
            this.showToolLine(`正在调用工具: ${data.tool_name}`);
          } catch (err) {
            this.showError("tool_started 解析失败");
          }
        });

        // 工具执行完成。
        this.eventSource.addEventListener("tool_completed", (e) => {
          try {
            const data = JSON.parse(e.data);
            this.showToolLine(`✅ 工具执行完成: ${data.tool_name}`);
          } catch (err) {
            this.showError("tool_completed 解析失败");
          }
        });

        // 文本增量。
        // 这是实现“助手边想边说”的关键事件。
        this.eventSource.addEventListener("text_delta", (e) => {
          try {
            const data = JSON.parse(e.data);
            this.appendAssistantDelta(data.text || "");
          } catch (err) {
            this.showError("后端返回了无法解析的事件数据（text_delta）");
          }
        });

        // Agent 更新事件。
        // 在单 Agent 示例里意义有限，但保留下来方便以后扩展多 Agent。
        this.eventSource.addEventListener("agent_updated", (e) => {
          try {
            const data = JSON.parse(e.data);
            this.showToolLine(`👤 Agent切换: ${data.agent_name}`);
          } catch (err) {
            // 这里不是关键事件，解析失败可以忽略。
          }
        });

        // 整个运行结束。
        this.eventSource.addEventListener("run_completed", (e) => {
          try {
            // 这里理论上可以使用 final_output 做额外校验，
            // 但当前页面已经通过 text_delta 拼出完整回复了。
            JSON.parse(e.data);
          } catch (_) {}
          this.finishAssistantMessage();
          this.updateStatus("完成", false);
          this.closeStream();
        });

        // SSE 连接层面的错误事件。
        this.eventSource.addEventListener("error", (e) => {
          this.showError("SSE连接错误或中断（可能后端异常/跨域/接口不可达）");
          this.finishAssistantMessage();
          this.closeStream();
        });

        // 兜底处理：
        // 如果后端没有显式写 `event: xxx`，浏览器会把它当默认 `message` 事件。
        this.eventSource.onmessage = (e) => {
          try {
            const payload = JSON.parse(e.data);
            if (payload && payload.type === "text_delta" && payload.data?.text) {
              this.appendAssistantDelta(payload.data.text);
            }
          } catch (_) {
            // 忽略非标准兜底格式
          }
        };
      }

      // ===== Public action =====
      sendMessage() {
        /*
          页面点击“发送”或按下回车时触发。

          执行流程：
          1. 读取输入框文本
          2. 把用户消息渲染到页面
          3. 清空输入框
          4. 建立 SSE 连接
          5. 等待后端持续推送事件
        */
        const input = document.getElementById("messageInput");
        const text = (input.value || "").trim();
        if (!text) return;

        this.addUserMessage(text);
        input.value = "";

        this.openStream(text);
      }
    }

    // 页面加载完成后，创建一个全局聊天客户端实例。
    document.addEventListener("DOMContentLoaded", () => {
      window.chatClient = new ChatClient();
    });

    // 暴露给按钮 onclick 使用。
    window.sendMessage = function() {
      if (window.chatClient) window.chatClient.sendMessage();
    };
  </script>
</body>
</html>
